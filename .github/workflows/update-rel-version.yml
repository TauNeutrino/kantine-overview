name: Update Stable Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag to write into rel-version.json (e.g. v2.0.0)'
        required: true
        default: ''

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
          token: ${{ secrets.GIT_PAT }}

      - name: Write rel-version.json
        run: |
          VERSION="${{ github.event.release.tag_name || github.event.inputs.version }}"
          if [ -z "$VERSION" ]; then echo "No version provided"; exit 1; fi
          echo "Release tag: $VERSION"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          VERSION="$VERSION" node -e "
            const v = process.env.VERSION;
            const manifest = {
              version: v,
              bundleUrl: 'https://cdn.jsdelivr.net/gh/TauNeutrino/kantine-overview@' + v + '/dist/kantine-auto-update-bundle.js'
            };
            require('fs').writeFileSync('rel-version.json', JSON.stringify(manifest, null, 2) + '\n');
            console.log('rel-version.json written for', v);
          "

      - name: Commit and push
        run: |
          VERSION="${{ github.event.release.tag_name || github.event.inputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add rel-version.json
          if git diff --staged --quiet; then
            echo "No changes to rel-version.json"
          else
            git commit -m "chore: update rel-version.json for ${VERSION} [skip ci]"
            git push origin main
            echo "Pushed rel-version.json update"
          fi
