name: Android CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-licenses: true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle.kts', 'android/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-

      - name: Decode signing keystore
        run: |
          mkdir -p android/keystore
          echo "${{ secrets.SIGNING_KEY_BASE64 }}" | base64 -d > android/keystore/release.jks

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Run lint
        working-directory: android
        run: ./gradlew lint

      - name: Run unit tests
        working-directory: android
        run: ./gradlew test

      - name: Build release AAB
        if: github.event_name != 'pull_request'
        working-directory: android
        run: ./gradlew bundleRelease
