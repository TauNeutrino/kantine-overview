name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GIST_PAT:  ${{ secrets.GIST_PAT }}
      GIST_ID:   ${{ secrets.GIST_ID }}
      GIST_SALT: ${{ secrets.GIST_SALT }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GIT_PAT }}
      
      - name: Bump patch version
        if: github.ref == 'refs/heads/main'
        run: |
          VERSION=$(cat version.txt | sed 's/^v//')
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          NEW_VERSION="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "$NEW_VERSION" > version.txt
          echo "BUMPED_VERSION=$NEW_VERSION" >> "$GITHUB_ENV"
      
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Copy dashboard into dist
        run: mkdir -p dist/stats && cp -r stats/. dist/stats/
      
      - name: Commit bump and build artifacts
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add version.txt dist/
          if ! git diff --staged --quiet; then
            git commit -m "chore: bump version to $BUMPED_VERSION [skip ci]"
            git push origin main
          fi
      
      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
