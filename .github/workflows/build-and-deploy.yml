name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GIST_PAT:  ${{ secrets.GIST_PAT }}
      GIST_ID:   ${{ secrets.GIST_ID }}
      GIST_SALT: ${{ secrets.GIST_SALT }}
    steps:
      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.GIT_PAT }}
       
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Copy dashboard into dist
        run: mkdir -p dist/stats && cp -r stats/. dist/stats/

      - name: Tag release with build artifacts
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          VERSION=$(cat version.txt | tr -d '[:space:]')
          echo "Version from version.txt: $VERSION"

          git add dist/
          if ! git diff --staged --quiet; then
            git commit -m "chore: update build artifacts for $VERSION [skip ci]"
          fi

          # Tag the local commit (with dist/ if changed) and push ONLY the tag.
          # main itself is never pushed here, so no extra commits appear on the branch.
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            git tag -f "$VERSION"
            echo "Moved existing tag $VERSION to current commit"
          else
            git tag "$VERSION"
            echo "Created tag $VERSION at current commit"
          fi
          git push origin --force "$VERSION"
      
      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
