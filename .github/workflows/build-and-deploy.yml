name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GIST_PAT:  ${{ secrets.GIST_PAT }}
      GIST_ID:   ${{ secrets.GIST_ID }}
      GIST_SALT: ${{ secrets.GIST_SALT }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GIT_PAT }}
       
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Copy dashboard into dist
        run: mkdir -p dist/stats && cp -r stats/. dist/stats/

      - name: Tag release from version.txt
        if: github.ref == 'refs/heads/main'
        env:
          TRIGGER_SHA: ${{ github.sha }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          VERSION=$(cat version.txt | tr -d '[:space:]')
          echo "Version from version.txt: $VERSION"
          PREV=$(git show "${TRIGGER_SHA}^:version.txt" 2>/dev/null | tr -d '[:space:]' || true)
          echo "Previous version: ${PREV:-<none>}"
          if [ "$VERSION" = "$PREV" ]; then
            echo "version.txt unchanged on this commit — skipping tag."
            exit 0
          fi
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            git tag -f "$VERSION" "$TRIGGER_SHA"
            echo "Moved existing tag $VERSION to $TRIGGER_SHA"
          else
            git tag "$VERSION" "$TRIGGER_SHA"
            echo "Created tag $VERSION at $TRIGGER_SHA"
          fi
          git push origin --force "$VERSION"
      
      - name: Commit build artifacts
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/
          if ! git diff --staged --quiet; then
            git commit -m "chore: update build artifacts for $(cat version.txt | tr -d '[:space:]')"
            git push origin main
          fi
      
      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
